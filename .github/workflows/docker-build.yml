name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package*.json'
      - 'Dockerfile*'
      - '.dockerignore'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: pair-lunch:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image
        run: |
          docker run --rm -d --name pair-lunch-test -p 3000:3000 pair-lunch:${{ github.sha }}
          sleep 5
          docker exec pair-lunch-test wget --quiet --tries=1 --spider http://localhost:3000/ || exit 1
          docker stop pair-lunch-test

